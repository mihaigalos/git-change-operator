name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.21'

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Install just
      run: |
        mkdir -p /tmp/just
        curl -L https://github.com/casey/just/releases/download/1.45.0/just-1.45.0-x86_64-unknown-linux-musl.tar.gz | tar xz -C /tmp/just
        sudo mv /tmp/just/just /usr/local/bin/
        rm -rf /tmp/just
        just --version

    - name: Run tests
      run: just test

    - name: Run just vet check
      run: |
        just vet
        git diff --exit-code --name-only -- '*.go'
      
    - name: Run helm lint
      run: just helm-lint

    - name: Generate manifests and check for changes
      run: |
        just manifests
        if [[ -n $(git status --porcelain config/crd config/rbac) ]]; then
          echo "Generated manifests are out of date. Please run 'just manifests' and commit the changes."
          git status --porcelain config/crd config/rbac
          git diff config/crd config/rbac
          exit 1
        fi

    - name: Generate code and check for changes
      run: |
        just generate
        if [[ -n $(git status --porcelain api/ config/crd) ]]; then
          echo "Generated code is out of date. Please run 'just generate' and commit the changes."
          git status --porcelain api/ config/crd
          git diff api/ config/crd
          exit 1
        fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Install just
      run: |
        mkdir -p /tmp/just
        curl -L https://github.com/casey/just/releases/download/1.45.0/just-1.45.0-x86_64-unknown-linux-musl.tar.gz | tar xz -C /tmp/just
        sudo mv /tmp/just/just /usr/local/bin/
        rm -rf /tmp/just
        just --version

    - name: Build manager binary
      run: just build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: manager-binary
        path: bin/manager
        retention-days: 1

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: 'latest'

    - name: Install just
      run: |
        mkdir -p /tmp/just
        curl -L https://github.com/casey/just/releases/download/1.45.0/just-1.45.0-x86_64-unknown-linux-musl.tar.gz | tar xz -C /tmp/just
        sudo mv /tmp/just/just /usr/local/bin/
        rm -rf /tmp/just
        just --version

    - name: Lint Helm chart
      run: just helm-lint

    - name: Generate Helm template
      run: just helm-template

  # Status check aggregates all required jobs for branch protection rules.
  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [test, build, helm-lint]
    if: always()
    
    steps:
    - name: Check all jobs status
      run: |
        echo "=== Job Results ==="
        echo "Test: ${{ needs.test.result }}"
        echo "Build: ${{ needs.build.result }}"
        echo "Helm Lint: ${{ needs.helm-lint.result }}"
        echo "=================="
        
        if [ "${{ needs.test.result }}" != "success" ] || \
           [ "${{ needs.build.result }}" != "success" ] || \
           [ "${{ needs.helm-lint.result }}" != "success" ]; then
          echo "One or more required jobs failed"
          exit 1
        else
          echo "All required jobs passed"
        fi