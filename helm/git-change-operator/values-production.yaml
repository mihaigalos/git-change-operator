# Production values for git-change-operator
# This configuration uses minimal, specific RBAC permissions

# Extra RBAC rules for resources your GitCommit/PullRequest specs reference.
# Uncomment and customise as needed - keep to the minimum required.
rbac:
  create: true
  extraRbac: []
  # extraRbac:
  #   - apiGroups: [""]
  #     resources: ["configmaps", "pods", "services", "persistentvolumeclaims"]
  #     verbs: ["get", "list", "watch"]
  #   - apiGroups: ["apps"]
  #     resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  #     verbs: ["get", "list", "watch"]
  #   - apiGroups: ["networking.k8s.io"]
  #     resources: ["ingresses", "networkpolicies"]
  #     verbs: ["get", "list", "watch"]

# Production security settings
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

# Resource limits for production
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

# Monitoring for production
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    
# Production logging
operator:
  logLevel: info
  leaderElect: true