{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "git-change-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "git-change-operator.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "git-change-operator.roleName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "git-change-operator.labels" . | nindent 4 }}
rules:
# Emit Kubernetes events
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
# Leader election
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
# Manage own GitChangeOperator CR
- apiGroups: ["gco.galos.one"]
  resources: ["gitchangeoperators"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
- apiGroups: ["gco.galos.one"]
  resources: ["gitchangeoperators/finalizers"]
  verbs: ["update"]
- apiGroups: ["gco.galos.one"]
  resources: ["gitchangeoperators/status"]
  verbs: ["get", "patch", "update"]
# Create and manage child ServiceAccount for the operator pod
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
# Create and manage child Role/RoleBinding for the operator pod
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
# Create and manage child Deployment (the operator pod)
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
# Create and manage metrics Service
- apiGroups: [""]
  resources: ["services"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
# Create and manage ServiceMonitor (optional, Prometheus Operator)
- apiGroups: ["monitoring.coreos.com"]
  resources: ["servicemonitors"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
# Create and manage Ingress (optional)
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]
{{- range .Values.rbac.extraRbac }}
- apiGroups:
{{- range .apiGroups }}
  - {{ . | quote }}
{{- end }}
  resources:
{{- range .resources }}
  - {{ . | quote }}
{{- end }}
  verbs:
{{- range .verbs }}
  - {{ . | quote }}
{{- end }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "git-change-operator.roleBindingName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "git-change-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "git-change-operator.roleName" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "git-change-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace | quote }}
{{- end }}
